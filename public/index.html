<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stage AI Controller</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b10;
        color: #f6f8fb;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 15%, rgba(32, 181, 167, 0.2), transparent 26rem),
          radial-gradient(circle at 83% 12%, rgba(224, 86, 86, 0.18), transparent 24rem),
          #080b10;
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 34px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .status {
        min-width: 280px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.07);
        padding: 18px 20px;
        border-radius: 8px;
        text-align: right;
      }

      .status-label {
        display: block;
        color: #96a0ae;
        font-size: 0.95rem;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      #statusText {
        display: block;
        font-size: clamp(1.3rem, 2.4vw, 2rem);
        font-weight: 800;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      button {
        min-height: 112px;
        border: 0;
        border-radius: 8px;
        color: #081014;
        font-size: clamp(1rem, 2vw, 1.45rem);
        font-weight: 900;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
        box-shadow: none;
      }

      #connectBtn { background: #41e1c6; }
      #ouraBtn { background: #f8b37f; }
      #askBtn { background: #f4d35e; }
      #muteBtn { background: #8ec5ff; }
      #finaleBtn { background: #b8f06a; }
      #killBtn { background: #ff6868; }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      .metric {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        padding: 14px 16px;
      }

      .metric span {
        display: block;
        color: #96a0ae;
        font-size: 0.8rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: clamp(1.25rem, 2vw, 1.75rem);
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 1.1rem;
        color: #cbd3dd;
        text-transform: uppercase;
      }

      #log {
        height: min(44vh, 430px);
        overflow: auto;
        margin: 0;
        padding: 18px 20px;
        font: 1rem/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        white-space: pre-wrap;
      }

      audio {
        width: 100%;
        margin-top: 18px;
      }

      @media (max-width: 1040px) {
        .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }

      @media (max-width: 820px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .status {
          text-align: left;
          min-width: 0;
        }

        .controls { grid-template-columns: 1fr; }
        .metrics { grid-template-columns: 1fr; }
        button { min-height: 86px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Stage AI Controller</h1>
        <div class="status" aria-live="polite">
          <span class="status-label">Status</span>
          <span id="statusText">Offline</span>
        </div>
      </header>

      <section class="controls" aria-label="Stage AI controls">
        <button id="connectBtn" type="button">CONNECT AI</button>
        <button id="ouraBtn" type="button">CONNECT OURA</button>
        <button id="askBtn" type="button" disabled>ASK CRITAI</button>
        <button id="muteBtn" type="button" disabled>MUTE MIC TO AI</button>
        <button id="finaleBtn" type="button" disabled>FINALE MODE</button>
        <button id="killBtn" type="button" disabled>KILL AI</button>
      </section>

      <section class="metrics" aria-label="Session metrics">
        <div class="metric">
          <span>Elapsed</span>
          <strong id="elapsedText">00:00</strong>
        </div>
        <div class="metric">
          <span>Context</span>
          <strong id="contextText">0 items</strong>
        </div>
        <div class="metric">
          <span>Mode</span>
          <strong id="modeText">Standby</strong>
        </div>
      </section>

      <section class="panel" aria-label="Realtime event log">
        <h2>Realtime Log</h2>
        <pre id="log"></pre>
      </section>

      <audio id="remoteAudio" autoplay playsinline controls></audio>
    </main>

    <script>
      const connectBtn = document.getElementById('connectBtn');
      const ouraBtn = document.getElementById('ouraBtn');
      const askBtn = document.getElementById('askBtn');
      const muteBtn = document.getElementById('muteBtn');
      const finaleBtn = document.getElementById('finaleBtn');
      const killBtn = document.getElementById('killBtn');
      const statusText = document.getElementById('statusText');
      const elapsedText = document.getElementById('elapsedText');
      const contextText = document.getElementById('contextText');
      const modeText = document.getElementById('modeText');
      const logEl = document.getElementById('log');
      const remoteAudio = document.getElementById('remoteAudio');

      const FINALE_MODE_AFTER_MS = 24 * 60 * 1000;
      const FINALE_KEEP_ITEMS = 8;
      const TOKEN_PRUNE_THRESHOLD = 18000;
      const ROLLING_MEMORY_KEEP_ITEMS = 4;
      const ROLLING_MEMORY_MIN_ITEMS = 5;
      const AI_AUDIO_GATE_RELEASE_DELAY_MS = 800;
      const MAX_LOG_CHARS = 60000;
      const OURA_FUNCTION_NAME = 'get_oura_heart_rate';
      const FINAL_AUDIO_ONLY_INSTRUCTION =
        'Produce exactly one spoken assistant message in the final_answer phase only. Do not emit commentary audio or a spoken preamble.';
      const FAST_FINALE_TURN_DETECTION = {
        type: 'server_vad',
        threshold: 0.5,
        prefix_padding_ms: 300,
        silence_duration_ms: 250,
        create_response: false,
        interrupt_response: false,
      };
      const RECENT_SILENT_USER_ITEMS_TO_KEEP = 8;
      const RECENT_AUTO_RESPONSE_ITEM_IDS = 6;
      const HUMAN_VS_AI_FOLLOW_UP_WINDOW_MS = 90 * 1000;

      let peerConnection;
      let dataChannel;
      let localStream;
      let micMuted = false;
      let sessionGeneration = 0;
      let aiAudioGateActive = false;
      let aiAudioGateReleaseTimerId;
      let sessionStartedAt = 0;
      let timerId;
      let finaleMode = false;
      let lastPruneAt = 0;
      let rollingSummary = '';
      let summaryInFlight = false;
      let pendingSummaryResponseId = null;
      let pendingSummaryText = '';
      let pendingSummaryItemIds = [];
      let spokenResponseCreatePending = false;
      const conversationItems = new Map();
      const deletedItemIds = new Set();
      const summaryItemIds = new Set();
      const activeResponseIds = new Set();
      const summaryResponseIds = new Set();
      const summaryOutputItemIds = new Set();
      const activeSpokenResponseIds = new Set();
      const activeOutputAudioResponseIds = new Set();
      const recentAutoResponseItemIds = [];
      let lastHumanVsAiCueAt = 0;

      function setStatus(message) {
        statusText.textContent = message;
      }

      async function refreshOuraStatus() {
        try {
          const response = await fetch('/oura/status');
          const status = await response.json();

          if (status.connected) {
            ouraBtn.textContent = 'OURA CONNECTED';
            ouraBtn.disabled = false;
            return;
          }

          if (status.oauth_configured) {
            ouraBtn.textContent = 'CONNECT OURA';
            ouraBtn.disabled = false;
            return;
          }

          ouraBtn.textContent = 'OURA SETUP NEEDED';
          ouraBtn.disabled = true;
        } catch {
          ouraBtn.textContent = 'OURA STATUS ERROR';
          ouraBtn.disabled = true;
        }
      }

      function log(message, details) {
        const time = new Date().toLocaleTimeString();
        const suffix = details ? ` ${JSON.stringify(details)}` : '';
        const nextText = `${logEl.textContent}[${time}] ${message}${suffix}\n`;
        logEl.textContent =
          nextText.length > MAX_LOG_CHARS ? nextText.slice(nextText.length - MAX_LOG_CHARS) : nextText;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function formatElapsed(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
        const seconds = String(totalSeconds % 60).padStart(2, '0');
        return `${minutes}:${seconds}`;
      }

      function refreshMetrics() {
        const elapsedMs = sessionStartedAt ? Date.now() - sessionStartedAt : 0;
        elapsedText.textContent = formatElapsed(elapsedMs);
        contextText.textContent = `${conversationItems.size} items`;
        modeText.textContent = finaleMode ? 'Finale' : sessionStartedAt ? 'Live' : 'Standby';
        finaleBtn.disabled = !sessionStartedAt || finaleMode;

        if (
          sessionStartedAt &&
          !finaleMode &&
          elapsedMs >= FINALE_MODE_AFTER_MS &&
          dataChannel?.readyState === 'open'
        ) {
          enterFinaleMode('timer');
        }
      }

      function rememberConversationItem(item) {
        if (!item?.id || deletedItemIds.has(item.id) || summaryOutputItemIds.has(item.id)) {
          return;
        }

        const existing = conversationItems.get(item.id) || {};
        conversationItems.set(item.id, {
          ...existing,
          id: item.id,
          role: item.role || existing.role,
          type: item.type || existing.type,
          status: item.status || existing.status,
          content: item.content || existing.content || [],
          createdAt: existing.createdAt || Date.now(),
          updatedAt: Date.now(),
        });
        refreshMetrics();
      }

      function rememberInputTranscript(payload) {
        const item = conversationItems.get(payload.item_id);
        if (!item) {
          return;
        }

        const transcripts = { ...(item.transcripts || {}) };
        transcripts[payload.content_index || 0] = payload.transcript || '';
        conversationItems.set(item.id, {
          ...item,
          transcripts,
          updatedAt: Date.now(),
        });
      }

      function normalizeTranscript(transcript) {
        return String(transcript || '')
          .toLowerCase()
          .replace(/[’`]/g, "'")
          .replace(/\s+/g, ' ')
          .trim();
      }

      function hasWakeCue(transcript) {
        const text = normalizeTranscript(transcript);
        if (!text) {
          return false;
        }

        const wakeName = '(?:crit\\s*a\\.?\\s*i\\.?|critai|crite\\s*ai|krit\\s*ai|crit\\s*ay\\s*eye)';
        const criteoAiName = 'criteo\\s*ai';
        const requestWords =
          '(?:what|explain|jump|can|could|tell|give|how|why|when|where|do|does|should|would|introduce|check|please)';
        const directCueSuffix = `(?=\\s*[,;:]|\\s+${requestWords}\\b|\\s*$)`;
        const postNameRequest =
          '(?:(?:so|now|okay|ok)\\s*,?\\s+)?(?:please\\s+)?(?:introduce\\s+yourself|say\\s+hello|jump\\s+in|take\\s+it(?:\\s+away)?|tell\\s+(?:them|us)\\s+who\\s+you\\s+are)';
        const directAddressPatterns = [
          new RegExp(`^(?:hey\\s+|hi\\s+|okay\\s+|ok\\s+|yo\\s+|so\\s+|now\\s+)?${wakeName}\\b${directCueSuffix}`, 'i'),
          new RegExp(
            `^(?:hey\\s+|hi\\s+|okay\\s+|ok\\s+|yo\\s+|so\\s+|now\\s+)?${criteoAiName}\\b${directCueSuffix}`,
            'i'
          ),
          new RegExp(`[.!?]\\s*(?:hey\\s+|hi\\s+|okay\\s+|ok\\s+|yo\\s+)?${wakeName}\\b${directCueSuffix}`, 'i'),
          new RegExp(`[.!?]\\s*(?:hey\\s+|hi\\s+|okay\\s+|ok\\s+|yo\\s+)?${criteoAiName}\\b${directCueSuffix}`, 'i'),
          new RegExp(`[,;:]\\s*${wakeName}\\b`, 'i'),
          new RegExp(`[,;:]\\s*${criteoAiName}\\b`, 'i'),
          new RegExp(`\\b(?:hey|hi|yo)\\s+${wakeName}\\b`, 'i'),
          new RegExp(`\\b(?:hey|hi|yo)\\s+${criteoAiName}\\b`, 'i'),
          new RegExp(`\\b${wakeName}\\b\\s*[,;:]\\s*${postNameRequest}\\b`, 'i'),
          new RegExp(`\\b${criteoAiName}\\b\\s*[,;:]\\s*${postNameRequest}\\b`, 'i'),
          new RegExp(`\\b${wakeName}\\b\\s*[.!?]\\s*${postNameRequest}\\b`, 'i'),
          new RegExp(`\\b${criteoAiName}\\b\\s*[.!?]\\s*${postNameRequest}\\b`, 'i'),
        ];

        return directAddressPatterns.some((pattern) => pattern.test(text));
      }

      function hasHumanVsAiPrimaryCue(transcript) {
        const text = normalizeTranscript(transcript);
        return (
          /\bonly\s+(?:a\s+)?human(?:s)?\s+(?:could|can)\s+(?:present|connect|do|deliver|read)\b/.test(text) ||
          /\bonly\s+(?:a\s+)?human(?:s)?\s+(?:could|can)\s+.*\b(?:audience|slide|room|stage)\b/.test(text)
        );
      }

      function hasHumanVsAiFollowUpCue(transcript) {
        if (!lastHumanVsAiCueAt || Date.now() - lastHumanVsAiCueAt > HUMAN_VS_AI_FOLLOW_UP_WINDOW_MS) {
          return false;
        }

        const text = normalizeTranscript(transcript);
        return (
          /\bno\s+no\s+no\b/.test(text) ||
          /\bhuman(?:s)?\s+(?:is|are|do|does|did|can)\s+.*\b(?:best|better)\b/.test(text) ||
          /\ba\s+human\s+is\s+best\b/.test(text)
        );
      }

      function hasOuraCue(transcript) {
        const text = normalizeTranscript(transcript);
        return (
          /\b(?:how's|how is|check|what's|what is)\s+(?:my\s+)?oura\b/.test(text) ||
          /\b(?:current|recent|latest)\s+(?:oura\s+)?heart\s+rate\b/.test(text)
        );
      }

      function detectAutoResponseTrigger(transcript) {
        if (hasHumanVsAiPrimaryCue(transcript)) {
          lastHumanVsAiCueAt = Date.now();
          return {
            type: 'human_vs_ai_primary',
            label: 'human-vs-AI stage cue',
            instruction:
              'The latest transcript matched the human-versus-AI stage bit. Respond to that latest turn immediately, playfully turn on Keaton, and stop.',
          };
        }

        if (hasHumanVsAiFollowUpCue(transcript)) {
          return {
            type: 'human_vs_ai_follow_up',
            label: 'human-vs-AI follow-up cue',
            instruction:
              'The latest transcript matched the human-versus-AI follow-up. Accuse Keaton playfully that the slides were made with AI too, make one concise point, and stop.',
          };
        }

        if (hasWakeCue(transcript)) {
          return {
            type: 'wake_cue',
            label: 'Critai wake phrase',
            instruction:
              'The latest transcript contains a direct Crit A.I. wake cue. Answer only that latest cue as Crit A.I., be concise and stage-ready, then stop. If you refer to yourself by name, write it exactly as "Crit A.I.", not "Critai".',
          };
        }

        if (hasOuraCue(transcript)) {
          return {
            type: 'oura_cue',
            label: 'Oura cue',
            instruction:
              'The latest transcript asks for Oura or heart-rate data. Use the Oura tool before answering, keep it factual and concise, and do not give medical advice.',
          };
        }

        return null;
      }

      function rememberAutoResponseItemId(itemId) {
        if (!itemId) {
          return;
        }

        recentAutoResponseItemIds.push(itemId);
        while (recentAutoResponseItemIds.length > RECENT_AUTO_RESPONSE_ITEM_IDS) {
          recentAutoResponseItemIds.shift();
        }
      }

      function pruneSilentUserContext() {
        const userItems = [...conversationItems.values()]
          .filter((item) => item.status === 'completed' && item.role === 'user' && !deletedItemIds.has(item.id))
          .sort((a, b) => a.createdAt - b.createdAt);

        const itemsToDelete = userItems.slice(0, Math.max(0, userItems.length - RECENT_SILENT_USER_ITEMS_TO_KEEP));
        for (const item of itemsToDelete) {
          sendRealtimeEvent(
            {
              type: 'conversation.item.delete',
              item_id: item.id,
            },
            'Deleted older uncued transcript item'
          );
          conversationItems.delete(item.id);
          deletedItemIds.add(item.id);
        }

        if (itemsToDelete.length) {
          log(`Pruned ${itemsToDelete.length} older uncued transcript items`);
          refreshMetrics();
        }
      }

      function requestAutoResponseForTranscript(payload) {
        const transcript = payload.transcript || '';
        const trigger = detectAutoResponseTrigger(transcript);
        if (!trigger) {
          log('Auto-response skipped: transcript did not match a wake phrase, Oura cue, or stage cue', {
            item_id: payload.item_id,
            transcript,
          });
          pruneSilentUserContext();
          return;
        }

        if (recentAutoResponseItemIds.includes(payload.item_id)) {
          return;
        }

        if (spokenResponseCreatePending || activeSpokenResponseIds.size || activeOutputAudioResponseIds.size) {
          log(`Auto-response skipped for ${trigger.label}: another spoken response is still active`, {
            item_id: payload.item_id,
            transcript,
          });
          return;
        }

        rememberAutoResponseItemId(payload.item_id);
        const sent = sendRealtimeEvent(
          {
            type: 'response.create',
            response: {
              output_modalities: ['audio'],
              metadata: {
                response_purpose: 'auto_cue',
                trigger: trigger.type,
                item_id: payload.item_id,
              },
              instructions: [
                FINAL_AUDIO_ONLY_INSTRUCTION,
                trigger.instruction,
                finaleMode
                  ? 'This is finale mode, so use one concise closing-stage beat and do not give an empty handoff.'
                  : 'Do not give an empty handoff.',
              ].join(' '),
            },
          },
          `Auto-response requested for ${trigger.label}`
        );
        spokenResponseCreatePending = sent;
      }

      function sendRealtimeEvent(event, label) {
        if (!dataChannel || dataChannel.readyState !== 'open') {
          log(`${label} ignored: data channel is not open`);
          return false;
        }

        dataChannel.send(JSON.stringify(event));
        log(label, event);
        return true;
      }

      function shouldLogRealtimePayload(payload) {
        return typeof payload?.type !== 'string' || !payload.type.endsWith('.delta');
      }

      function extractInvalidDeleteItemId(error) {
        const match = String(error?.message || '').match(/id '([^']+)'/);
        return match?.[1];
      }

      function handleRealtimeError(payload) {
        if (payload?.type !== 'error') {
          return false;
        }

        if (payload.error?.code === 'item_delete_invalid_item_id') {
          const itemId = extractInvalidDeleteItemId(payload.error);
          if (itemId) {
            conversationItems.delete(itemId);
            deletedItemIds.add(itemId);
            refreshMetrics();
          }
          log(`Delete skipped: ${itemId || 'item'} is already absent on server`);
          return true;
        }

        if (payload.error?.code === 'conversation_already_has_active_response') {
          spokenResponseCreatePending = false;
        }

        return false;
      }

      function cancelInFlightResponses() {
        if (!dataChannel || dataChannel.readyState !== 'open') {
          return;
        }

        const responseIds = new Set(activeResponseIds);
        if (pendingSummaryResponseId) {
          responseIds.add(pendingSummaryResponseId);
        }

        if (!responseIds.size) {
          return;
        }

        for (const responseId of responseIds) {
          sendRealtimeEvent(
            {
              type: 'response.cancel',
              response_id: responseId,
            },
            `Cancel requested for response ${responseId}`
          );
        }

        if (activeOutputAudioResponseIds.size) {
          sendRealtimeEvent(
            {
              type: 'output_audio_buffer.clear',
            },
            'Output audio buffer clear requested'
          );
        }
      }

      function syncMicTrackState() {
        if (!localStream) {
          return;
        }

        const shouldEnableMic = !micMuted && !aiAudioGateActive;
        localStream.getAudioTracks().forEach((track) => {
          track.enabled = shouldEnableMic;
        });
      }

      function setAiAudioGate(active, reason) {
        if (aiAudioGateReleaseTimerId) {
          clearTimeout(aiAudioGateReleaseTimerId);
          aiAudioGateReleaseTimerId = null;
        }

        if (active) {
          if (!aiAudioGateActive) {
            aiAudioGateActive = true;
            syncMicTrackState();
            log(`Mic gated while Critai is speaking${reason ? `: ${reason}` : ''}`);
          }
          return;
        }

        if (!aiAudioGateActive || activeSpokenResponseIds.size || activeOutputAudioResponseIds.size) {
          return;
        }

        aiAudioGateReleaseTimerId = setTimeout(() => {
          aiAudioGateReleaseTimerId = null;
          aiAudioGateActive = false;
          syncMicTrackState();
          log(`Mic gate released${reason ? `: ${reason}` : ''}`);
        }, AI_AUDIO_GATE_RELEASE_DELAY_MS);
      }

      function markSpokenResponseStarted(response) {
        if (response?.metadata?.response_purpose === 'rolling_summary') {
          return;
        }

        if (response?.id) {
          activeSpokenResponseIds.add(response.id);
        }
        setAiAudioGate(true, response?.id ? `response ${response.id}` : 'response started');
      }

      function markSpokenResponseDone(response) {
        if (response?.metadata?.response_purpose === 'rolling_summary') {
          return;
        }

        if (response?.id) {
          activeSpokenResponseIds.delete(response.id);
        }
        setAiAudioGate(false, response?.id ? `response ${response.id} done` : 'response done');
      }

      function markOutputAudioStarted(responseId) {
        if (responseId) {
          activeOutputAudioResponseIds.add(responseId);
        }
        setAiAudioGate(true, responseId ? `audio buffer ${responseId}` : 'audio buffer started');
      }

      function markOutputAudioStopped(responseId, eventType) {
        if (responseId) {
          activeOutputAudioResponseIds.delete(responseId);
        } else {
          activeOutputAudioResponseIds.clear();
        }
        setAiAudioGate(false, eventType === 'output_audio_buffer.cleared' ? 'audio buffer cleared' : 'audio buffer drained');
      }

      function parseFunctionArguments(rawArguments) {
        if (!rawArguments) {
          return {};
        }

        try {
          return JSON.parse(rawArguments);
        } catch {
          return {};
        }
      }

      async function fetchOuraHeartRate(args) {
        const lookbackHours = Number.isFinite(Number(args.lookback_hours)) ? Number(args.lookback_hours) : 24;
        const response = await fetch(`/oura/heart-rate?lookback_hours=${encodeURIComponent(lookbackHours)}`);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          return {
            available: false,
            error: payload.error || `Local Oura endpoint failed with HTTP ${response.status}`,
            connect_url: payload.connect_url || '/oura/connect',
          };
        }

        return payload;
      }

      async function runRealtimeFunction(functionCall) {
        const args = parseFunctionArguments(functionCall.arguments);

        if (functionCall.name !== OURA_FUNCTION_NAME) {
          return {
            available: false,
            error: `Unknown function: ${functionCall.name}`,
          };
        }

        return fetchOuraHeartRate(args);
      }

      async function handleFunctionCalls(functionCalls) {
        for (const functionCall of functionCalls) {
          let output;

          try {
            output = await runRealtimeFunction(functionCall);
          } catch (error) {
            output = {
              available: false,
              error: error instanceof Error ? error.message : 'Unknown function error',
            };
          }

          sendRealtimeEvent(
            {
              type: 'conversation.item.create',
              item: {
                type: 'function_call_output',
                call_id: functionCall.call_id,
                output: JSON.stringify(output),
              },
            },
            `Function output sent for ${functionCall.name}`
          );
        }

        spokenResponseCreatePending = sendRealtimeEvent(
          {
            type: 'response.create',
            response: {
              output_modalities: ['audio'],
              instructions: [
                FINAL_AUDIO_ONLY_INSTRUCTION,
                'Use the Oura function output to answer Keaton in one concise, factual line. Include the BPM and how recent the sample is when available. If unavailable, say Oura is not connected or has no recent sample; do not give medical advice.',
              ].join(' '),
            },
          },
          'Response requested after function output'
        );
      }

      function pruneConversation(reason, keepItems = FINALE_KEEP_ITEMS) {
        if (!dataChannel || dataChannel.readyState !== 'open') {
          return;
        }

        const now = Date.now();
        if (now - lastPruneAt < 5000) {
          return;
        }

        const deletableItems = [...conversationItems.values()]
          .filter((item) => item.status === 'completed' && item.role !== 'system' && !deletedItemIds.has(item.id))
          .sort((a, b) => a.createdAt - b.createdAt);

        const itemsToDelete = deletableItems.slice(0, Math.max(0, deletableItems.length - keepItems));

        for (const item of itemsToDelete) {
          sendRealtimeEvent(
            {
              type: 'conversation.item.delete',
              item_id: item.id,
            },
            `Deleted old context item for ${reason}`
          );
          conversationItems.delete(item.id);
          deletedItemIds.add(item.id);
        }

        if (itemsToDelete.length) {
          lastPruneAt = now;
          log(`Pruned ${itemsToDelete.length} old conversation items; kept ${keepItems} recent items`);
          refreshMetrics();
        }
      }

      function completedMemoryItems() {
        return [...conversationItems.values()]
          .filter((item) => item.status === 'completed' && item.role !== 'system' && !deletedItemIds.has(item.id))
          .sort((a, b) => a.createdAt - b.createdAt);
      }

      function extractResponseText(response) {
        return (response?.output || [])
          .flatMap((item) => item.content || [])
          .map((part) => part.text || part.transcript || '')
          .join(' ')
          .trim();
      }

      function scheduleRollingSummary(reason) {
        if (summaryInFlight || !dataChannel || dataChannel.readyState !== 'open') {
          return;
        }

        const items = completedMemoryItems();
        if (items.length < ROLLING_MEMORY_MIN_ITEMS) {
          return;
        }

        summaryInFlight = true;
        pendingSummaryText = '';
        pendingSummaryItemIds = items.map((item) => item.id);

        const summaryInput = [
          ...items.map((item) => ({
            type: 'item_reference',
            id: item.id,
          })),
          {
            type: 'message',
            role: 'user',
            content: [
              {
                type: 'input_text',
                text: [
                  'Update the rolling stage-memory summary for Crit A.I.',
                  'Preserve only durable facts, decisions, audience-relevant context, callbacks, and unresolved cues.',
                  'Drop filler, repeated wording, and obsolete detail.',
                  'Do not preserve literal handoff phrases such as "handing back to Keaton"; summarize cueing only as "speaks only on explicit Crit A.I. cue" when needed.',
                  'Keep it under 140 words and finish with a complete sentence.',
                  rollingSummary ? `Previous rolling summary:\n${rollingSummary}` : 'Previous rolling summary: none yet.',
                ].join('\n'),
              },
            ],
          },
        ];

        const sent = sendRealtimeEvent(
          {
            type: 'response.create',
            response: {
              conversation: 'none',
              output_modalities: ['text'],
              max_output_tokens: 520,
              metadata: {
                response_purpose: 'rolling_summary',
                reason,
              },
              input: summaryInput,
              instructions:
                'Return only the updated rolling summary text. Do not address Keaton. Do not include labels or markdown.',
            },
          },
          `Rolling memory summary requested for ${reason}`
        );

        if (!sent) {
          summaryInFlight = false;
          pendingSummaryItemIds = [];
        }
      }

      function applyRollingSummary(summaryText) {
        const trimmedSummary = summaryText.trim();
        if (!trimmedSummary) {
          summaryInFlight = false;
          pendingSummaryResponseId = null;
          pendingSummaryText = '';
          pendingSummaryItemIds = [];
          return;
        }

        rollingSummary = trimmedSummary;

        for (const itemId of summaryItemIds) {
          if (deletedItemIds.has(itemId)) {
            continue;
          }

          sendRealtimeEvent(
            {
              type: 'conversation.item.delete',
              item_id: itemId,
            },
            'Deleted prior rolling memory item'
          );
          conversationItems.delete(itemId);
          deletedItemIds.add(itemId);
        }
        summaryItemIds.clear();

        const summaryItemId = `stage_memory_${Date.now()}`;
        summaryItemIds.add(summaryItemId);

        sendRealtimeEvent(
          {
            type: 'conversation.item.create',
            item: {
              id: summaryItemId,
              type: 'message',
              role: 'system',
              content: [
                {
                  type: 'input_text',
                  text: `Rolling stage memory for older presentation context:\n${rollingSummary}`,
                },
              ],
            },
          },
          'Rolling memory item added'
        );

        const keepIds = new Set(completedMemoryItems().slice(-ROLLING_MEMORY_KEEP_ITEMS).map((item) => item.id));
        const idsToDelete = pendingSummaryItemIds.filter(
          (itemId) => !keepIds.has(itemId) && !summaryItemIds.has(itemId) && !deletedItemIds.has(itemId)
        );

        for (const itemId of idsToDelete) {
          sendRealtimeEvent(
            {
              type: 'conversation.item.delete',
              item_id: itemId,
            },
            'Deleted context item after rolling summary'
          );
          conversationItems.delete(itemId);
          deletedItemIds.add(itemId);
        }

        log(`Rolling memory updated; deleted ${idsToDelete.length} older items`);
        summaryInFlight = false;
        pendingSummaryResponseId = null;
        pendingSummaryText = '';
        pendingSummaryItemIds = [];
        refreshMetrics();
      }

      function enterFinaleMode(reason) {
        if (finaleMode) {
          pruneConversation(reason);
          return;
        }

        finaleMode = true;
        finaleBtn.textContent = 'FINALE ACTIVE';
        refreshMetrics();

        sendRealtimeEvent(
          {
            type: 'conversation.item.create',
            item: {
              type: 'message',
              role: 'system',
              content: [
                {
                  type: 'input_text',
                  text:
                    `The presentation is in its final wrap-up. ${FINAL_AUDIO_ONLY_INSTRUCTION} Keep context lightweight, answer only direct Crit A.I. cues, respond in one concise closing-stage beat, then stop speaking so Keaton can continue. If you refer to yourself by name, write it exactly as "Crit A.I.", not "Critai". Do not give an empty handoff.`,
                },
              ],
            },
          },
          `Finale mode enabled by ${reason}`
        );

        sendRealtimeEvent(
          {
            type: 'session.update',
            session: {
              audio: {
                input: {
                  turn_detection: FAST_FINALE_TURN_DETECTION,
                },
              },
            },
          },
          'Finale fast turn detection enabled'
        );

        pruneConversation(reason, FINALE_KEEP_ITEMS);
      }

      function setConnectedControls(connected) {
        connectBtn.disabled = connected;
        askBtn.disabled = !connected;
        muteBtn.disabled = !connected;
        finaleBtn.disabled = !connected || finaleMode;
        killBtn.disabled = !connected;
      }

      function stopSession() {
        cancelInFlightResponses();
        sessionGeneration += 1;

        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }

        if (dataChannel) {
          dataChannel.close();
          dataChannel = null;
        }

        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }

        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }

        remoteAudio.srcObject = null;
        micMuted = false;
        sessionStartedAt = 0;
        finaleMode = false;
        lastPruneAt = 0;
        rollingSummary = '';
        summaryInFlight = false;
        pendingSummaryResponseId = null;
        pendingSummaryText = '';
        pendingSummaryItemIds = [];
        spokenResponseCreatePending = false;
        conversationItems.clear();
        deletedItemIds.clear();
        summaryItemIds.clear();
        activeResponseIds.clear();
        summaryResponseIds.clear();
        summaryOutputItemIds.clear();
        activeSpokenResponseIds.clear();
        activeOutputAudioResponseIds.clear();
        recentAutoResponseItemIds.length = 0;
        lastHumanVsAiCueAt = 0;
        if (aiAudioGateReleaseTimerId) {
          clearTimeout(aiAudioGateReleaseTimerId);
          aiAudioGateReleaseTimerId = null;
        }
        aiAudioGateActive = false;
        muteBtn.textContent = 'MUTE MIC TO AI';
        finaleBtn.textContent = 'FINALE MODE';
        setConnectedControls(false);
        setStatus('Offline');
        refreshMetrics();
        log('Session closed');
      }

      async function connectAi() {
        try {
          setStatus('Connecting');
          connectBtn.disabled = true;
          log('Requesting microphone');
          sessionGeneration += 1;
          const sessionId = sessionGeneration;

          localStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });

          peerConnection = new RTCPeerConnection();
          dataChannel = peerConnection.createDataChannel('oai-events');

          dataChannel.addEventListener('open', () => {
            sessionStartedAt = Date.now();
            timerId = setInterval(refreshMetrics, 1000);
            setStatus('Connected');
            setConnectedControls(true);
            refreshMetrics();
            log('Data channel open');
            log('Critai transcript-gated wake-cue responses enabled');
            log('Semantic VAD high + far-field noise reduction enabled; automatic VAD responses disabled');
            log('Rolling memory enabled after each completed response');
            log('Finale mode will trim old context and use faster turn detection after 24 minutes');
          });

          dataChannel.addEventListener('message', (event) => {
            if (sessionId !== sessionGeneration) {
              return;
            }

            try {
              const payload = JSON.parse(event.data);
              if (handleRealtimeError(payload)) {
                return;
              }

              if (
                payload.type === 'response.created' &&
                payload.response?.metadata?.response_purpose === 'rolling_summary' &&
                payload.response.id
              ) {
                pendingSummaryResponseId = payload.response.id;
                summaryResponseIds.add(payload.response.id);
              }

              if (
                payload.type === 'response.output_item.added' &&
                summaryResponseIds.has(payload.response_id) &&
                payload.item?.id
              ) {
                summaryOutputItemIds.add(payload.item.id);
              }

              if (shouldLogRealtimePayload(payload)) {
                log(`Realtime event: ${payload.type || 'message'}`, payload);
              }

              if (payload.item) {
                rememberConversationItem(payload.item);
              }

              if (payload.type === 'response.created' && payload.response?.id) {
                activeResponseIds.add(payload.response.id);
                if (payload.response?.metadata?.response_purpose !== 'rolling_summary') {
                  spokenResponseCreatePending = false;
                }
              }

              if (payload.type === 'response.created') {
                markSpokenResponseStarted(payload.response);
              }

              if (payload.type === 'output_audio_buffer.started') {
                markOutputAudioStarted(payload.response_id);
              }

              if (
                payload.type === 'output_audio_buffer.stopped' ||
                payload.type === 'output_audio_buffer.cleared'
              ) {
                markOutputAudioStopped(payload.response_id, payload.type);
              }

              if (
                payload.type === 'conversation.item.input_audio_transcription.completed' &&
                payload.item_id
              ) {
                rememberInputTranscript(payload);
                requestAutoResponseForTranscript(payload);
              }

              if (payload.type === 'conversation.item.deleted' && payload.item_id) {
                conversationItems.delete(payload.item_id);
                deletedItemIds.add(payload.item_id);
                refreshMetrics();
              }

              if (payload.type === 'response.output_text.delta' && payload.response_id === pendingSummaryResponseId) {
                pendingSummaryText += payload.delta || '';
              }

              if (payload.type === 'response.output_text.done' && payload.response_id === pendingSummaryResponseId) {
                pendingSummaryText = payload.text || pendingSummaryText;
              }

              if (payload.type === 'response.done') {
                const purpose = payload.response?.metadata?.response_purpose;
                const status = payload.response?.status || 'unknown';
                const statusReason = payload.response?.status_details?.reason || 'none';
                const outputTokens = payload.response?.usage?.output_tokens || 0;
                if (payload.response?.id) {
                  activeResponseIds.delete(payload.response.id);
                }
                markSpokenResponseDone(payload.response);
                if (purpose !== 'rolling_summary') {
                  spokenResponseCreatePending = false;
                }

                const functionCalls = (payload.response?.output || []).filter((item) => item.type === 'function_call');
                if (functionCalls.length) {
                  log(`Function call requested: ${functionCalls.map((item) => item.name).join(', ')}`);
                  void handleFunctionCalls(functionCalls);
                  return;
                }

                const responseLabel = purpose === 'rolling_summary' ? 'Rolling summary' : 'Spoken response';
                log(`${responseLabel} finished: ${status}; reason: ${statusReason}; output tokens: ${outputTokens}`);

                if (purpose === 'rolling_summary') {
                  if (status !== 'completed') {
                    log(`Rolling summary discarded: ${status}; reason: ${statusReason}; kept existing memory and context`);
                    summaryInFlight = false;
                    pendingSummaryResponseId = null;
                    pendingSummaryText = '';
                    pendingSummaryItemIds = [];
                    return;
                  }

                  applyRollingSummary(pendingSummaryText || extractResponseText(payload.response));
                  return;
                }

                const inputTokens = payload.response?.usage?.input_tokens || 0;
                if (inputTokens >= TOKEN_PRUNE_THRESHOLD) {
                  enterFinaleMode(`token threshold ${inputTokens}`);
                } else if (finaleMode) {
                  pruneConversation('finale maintenance');
                }

                scheduleRollingSummary(`response ${payload.response?.id || 'completed'}`);
              }
            } catch {
              log('Realtime message', event.data);
            }
          });

          dataChannel.addEventListener('close', () => {
            if (sessionId !== sessionGeneration) {
              return;
            }

            log('Data channel closed');
          });

          peerConnection.addEventListener('connectionstatechange', () => {
            if (sessionId !== sessionGeneration) {
              return;
            }

            log(`Peer connection: ${peerConnection.connectionState}`);
            if (['failed', 'closed', 'disconnected'].includes(peerConnection.connectionState)) {
              setStatus(peerConnection.connectionState);
            }
          });

          peerConnection.addEventListener('track', (event) => {
            if (sessionId !== sessionGeneration) {
              return;
            }

            remoteAudio.srcObject = event.streams[0];
            log('Remote audio track received');
          });

          localStream.getAudioTracks().forEach((track) => {
            peerConnection.addTrack(track, localStream);
          });

          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          log('Sending SDP offer to local server');

          const response = await fetch('/session', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/sdp',
            },
            body: offer.sdp,
          });

          const answerSdp = await response.text();

          if (!response.ok) {
            throw new Error(answerSdp || `/session failed with HTTP ${response.status}`);
          }

          await peerConnection.setRemoteDescription({
            type: 'answer',
            sdp: answerSdp,
          });

          log('SDP answer applied');
        } catch (error) {
          stopSession();
          const message = error instanceof Error ? error.message : 'Unknown connection error';
          setStatus('Error');
          log(`Error: ${message}`);
          alert(`Could not connect to Stage AI:\n\n${message}`);
        } finally {
          if (!peerConnection) {
            connectBtn.disabled = false;
          }
        }
      }

      function askAi() {
        if (!dataChannel || dataChannel.readyState !== 'open') {
          log('ASK CRITAI ignored: data channel is not open');
          return;
        }

        if (spokenResponseCreatePending || activeSpokenResponseIds.size || activeOutputAudioResponseIds.size) {
          log('ASK CRITAI ignored: another spoken response is still active');
          return;
        }

        const event = {
          type: 'response.create',
          response: {
            output_modalities: ['audio'],
            instructions: [
              FINAL_AUDIO_ONLY_INSTRUCTION,
              finaleMode
                ? 'Respond now to Keaton\'s latest cue as Crit A.I. This is the wrap-up, so use one concise closing-stage beat, then stop speaking. If you refer to yourself by name, write it exactly as "Crit A.I.", not "Critai". Do not give an empty handoff.'
                : 'Respond now to Keaton\'s latest cue as Crit A.I. Be concise and stage-ready, then stop speaking. If you refer to yourself by name, write it exactly as "Crit A.I.", not "Critai". Do not give an empty handoff.',
            ].join(' '),
          },
        };

        spokenResponseCreatePending = sendRealtimeEvent(event, 'ASK CRITAI sent');
      }

      function toggleMute() {
        if (!localStream) {
          return;
        }

        micMuted = !micMuted;
        syncMicTrackState();
        muteBtn.textContent = micMuted ? 'UNMUTE MIC TO AI' : 'MUTE MIC TO AI';
        log(micMuted ? 'Mic muted to AI' : 'Mic unmuted to AI');
      }

      connectBtn.addEventListener('click', connectAi);
      ouraBtn.addEventListener('click', () => {
        window.location.href = '/oura/connect';
      });
      askBtn.addEventListener('click', askAi);
      muteBtn.addEventListener('click', toggleMute);
      finaleBtn.addEventListener('click', () => enterFinaleMode('manual control'));
      killBtn.addEventListener('click', stopSession);
      refreshOuraStatus();
    </script>
  </body>
</html>
