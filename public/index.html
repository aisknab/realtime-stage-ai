<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stage AI Controller</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b10;
        color: #f6f8fb;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 15%, rgba(32, 181, 167, 0.2), transparent 26rem),
          radial-gradient(circle at 83% 12%, rgba(224, 86, 86, 0.18), transparent 24rem),
          #080b10;
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 34px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .status {
        min-width: 280px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.07);
        padding: 18px 20px;
        border-radius: 8px;
        text-align: right;
      }

      .status-label {
        display: block;
        color: #96a0ae;
        font-size: 0.95rem;
        margin-bottom: 5px;
        text-transform: uppercase;
      }

      #statusText {
        display: block;
        font-size: clamp(1.3rem, 2.4vw, 2rem);
        font-weight: 800;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      button {
        min-height: 112px;
        border: 0;
        border-radius: 8px;
        color: #081014;
        font-size: clamp(1rem, 2vw, 1.45rem);
        font-weight: 900;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
        box-shadow: none;
      }

      #connectBtn { background: #41e1c6; }
      #askBtn { background: #f4d35e; }
      #muteBtn { background: #8ec5ff; }
      #killBtn { background: #ff6868; }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        padding: 18px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 1.1rem;
        color: #cbd3dd;
        text-transform: uppercase;
      }

      #log {
        height: min(44vh, 430px);
        overflow: auto;
        margin: 0;
        padding: 18px 20px;
        font: 1rem/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        white-space: pre-wrap;
      }

      audio {
        width: 100%;
        margin-top: 18px;
      }

      @media (max-width: 820px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .status {
          text-align: left;
          min-width: 0;
        }

        .controls { grid-template-columns: 1fr; }
        button { min-height: 86px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Stage AI Controller</h1>
        <div class="status" aria-live="polite">
          <span class="status-label">Status</span>
          <span id="statusText">Offline</span>
        </div>
      </header>

      <section class="controls" aria-label="Stage AI controls">
        <button id="connectBtn" type="button">CONNECT AI</button>
        <button id="askBtn" type="button" disabled>ASK CRITAI</button>
        <button id="muteBtn" type="button" disabled>MUTE MIC TO AI</button>
        <button id="killBtn" type="button" disabled>KILL AI</button>
      </section>

      <section class="panel" aria-label="Realtime event log">
        <h2>Realtime Log</h2>
        <pre id="log"></pre>
      </section>

      <audio id="remoteAudio" autoplay playsinline controls></audio>
    </main>

    <script>
      const connectBtn = document.getElementById('connectBtn');
      const askBtn = document.getElementById('askBtn');
      const muteBtn = document.getElementById('muteBtn');
      const killBtn = document.getElementById('killBtn');
      const statusText = document.getElementById('statusText');
      const logEl = document.getElementById('log');
      const remoteAudio = document.getElementById('remoteAudio');

      let peerConnection;
      let dataChannel;
      let localStream;
      let micMuted = false;

      function setStatus(message) {
        statusText.textContent = message;
      }

      function log(message, details) {
        const time = new Date().toLocaleTimeString();
        const suffix = details ? ` ${JSON.stringify(details)}` : '';
        logEl.textContent += `[${time}] ${message}${suffix}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setConnectedControls(connected) {
        connectBtn.disabled = connected;
        askBtn.disabled = !connected;
        muteBtn.disabled = !connected;
        killBtn.disabled = !connected;
      }

      function stopSession() {
        if (dataChannel) {
          dataChannel.close();
          dataChannel = null;
        }

        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }

        if (localStream) {
          localStream.getTracks().forEach((track) => track.stop());
          localStream = null;
        }

        remoteAudio.srcObject = null;
        micMuted = false;
        muteBtn.textContent = 'MUTE MIC TO AI';
        setConnectedControls(false);
        setStatus('Offline');
        log('Session closed');
      }

      async function connectAi() {
        try {
          setStatus('Connecting');
          connectBtn.disabled = true;
          log('Requesting microphone');

          localStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });

          peerConnection = new RTCPeerConnection();
          dataChannel = peerConnection.createDataChannel('oai-events');

          dataChannel.addEventListener('open', () => {
            setStatus('Connected');
            setConnectedControls(true);
            log('Data channel open');
            log('Critai wake-cue auto-response enabled');
            log('Semantic VAD high + far-field noise reduction enabled');
          });

          dataChannel.addEventListener('message', (event) => {
            try {
              const payload = JSON.parse(event.data);
              log(`Realtime event: ${payload.type || 'message'}`, payload);
            } catch {
              log('Realtime message', event.data);
            }
          });

          dataChannel.addEventListener('close', () => {
            log('Data channel closed');
          });

          peerConnection.addEventListener('connectionstatechange', () => {
            log(`Peer connection: ${peerConnection.connectionState}`);
            if (['failed', 'closed', 'disconnected'].includes(peerConnection.connectionState)) {
              setStatus(peerConnection.connectionState);
            }
          });

          peerConnection.addEventListener('track', (event) => {
            remoteAudio.srcObject = event.streams[0];
            log('Remote audio track received');
          });

          localStream.getAudioTracks().forEach((track) => {
            peerConnection.addTrack(track, localStream);
          });

          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          log('Sending SDP offer to local server');

          const response = await fetch('/session', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/sdp',
            },
            body: offer.sdp,
          });

          const answerSdp = await response.text();

          if (!response.ok) {
            throw new Error(answerSdp || `/session failed with HTTP ${response.status}`);
          }

          await peerConnection.setRemoteDescription({
            type: 'answer',
            sdp: answerSdp,
          });

          log('SDP answer applied');
        } catch (error) {
          stopSession();
          const message = error instanceof Error ? error.message : 'Unknown connection error';
          setStatus('Error');
          log(`Error: ${message}`);
          alert(`Could not connect to Stage AI:\n\n${message}`);
        } finally {
          if (!peerConnection) {
            connectBtn.disabled = false;
          }
        }
      }

      function askAi() {
        if (!dataChannel || dataChannel.readyState !== 'open') {
          log('ASK CRITAI ignored: data channel is not open');
          return;
        }

        const event = {
          type: 'response.create',
          response: {
            output_modalities: ['audio'],
            instructions:
              "Respond now to Keaton's latest cue as Critai. Be concise, stage-ready, and hand back to Keaton.",
          },
        };

        dataChannel.send(JSON.stringify(event));
        log('ASK CRITAI sent', event);
      }

      function toggleMute() {
        if (!localStream) {
          return;
        }

        micMuted = !micMuted;
        localStream.getAudioTracks().forEach((track) => {
          track.enabled = !micMuted;
        });
        muteBtn.textContent = micMuted ? 'UNMUTE MIC TO AI' : 'MUTE MIC TO AI';
        log(micMuted ? 'Mic muted to AI' : 'Mic unmuted to AI');
      }

      connectBtn.addEventListener('click', connectAi);
      askBtn.addEventListener('click', askAi);
      muteBtn.addEventListener('click', toggleMute);
      killBtn.addEventListener('click', stopSession);
    </script>
  </body>
</html>
